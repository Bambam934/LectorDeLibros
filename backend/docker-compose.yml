services:
  postgres:
    image: postgres:16
    container_name: lectorsync-postgres
    environment:
      POSTGRES_DB: lectorsync
      POSTGRES_USER: lectorsync_app
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_use_docker_secrets_in_prod}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U lectorsync_app -d lectorsync" ]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
